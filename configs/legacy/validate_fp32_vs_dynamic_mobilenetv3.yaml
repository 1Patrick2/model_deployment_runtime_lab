# FP32 vs Dynamic INT8 output consistency validation

fp32_model: outputs/onnx/mobilenetv3_small_imagenet_fp32.onnx
int8_model: outputs/onnx/mobilenetv3_small_imagenet_int8_dynamic.onnx
image_dir: samples/images/validation_real

preprocessing:
  mode: imagenet_v1
  resize_shorter: 256
  center_crop: [224, 224]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

output_json: outputs/reports/quant_validation_mobilenetv3_small_imagenet_fp32_vs_dynamic.json
output_md: outputs/reports/quant_validation_mobilenetv3_small_imagenet_fp32_vs_dynamic.md
