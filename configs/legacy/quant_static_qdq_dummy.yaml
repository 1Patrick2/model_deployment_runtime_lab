# Static QDQ quantization with dummy calibration
# This method avoids ConvInteger ops, making the model runnable on
# the CPUExecutionProvider.

input_model: outputs/onnx/mobilenetv3_small.onnx
output_model: outputs/onnx/mobilenetv3_small_int8_qdq_dummy.onnx
method: static_qdq
calibration: dummy
calibration_samples: 8
activation_type: quint8
weight_type: qint8
quant_format: qdq
