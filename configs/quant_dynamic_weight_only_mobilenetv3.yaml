# Dynamic linear-only INT8 baseline for MobileNetV3-small
# Only quantizes MatMul and Gemm — skips Conv to avoid ConvInteger.

input_model: outputs/onnx/mobilenetv3_small_imagenet_fp32.onnx
output_model: outputs/onnx/mobilenetv3_small_imagenet_int8_dynamic.onnx
method: dynamic
weight_type: qint8
op_types_to_quantize: ["MatMul", "Gemm"]
