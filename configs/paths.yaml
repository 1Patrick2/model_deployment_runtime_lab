# Model Deployment Runtime Lab - Path Configuration
# All paths in this file are relative to project root.
# Modify this file once, and all scripts will use these paths automatically.

# ============================================================================
# Set your project root path here, or leave null for auto-detect from CWD.
# ============================================================================
project_root: null  # Auto-detect (set to absolute path if needed)

# ============================================================================
# Configuration Files
# ============================================================================
configs:
  root: configs
  paths: configs/paths.yaml
  model: configs/model.yaml
  export: configs/export.yaml
  quant: configs/quant.yaml
  prune: configs/prune.yaml
  runtime: configs/runtime.yaml
  zmq: configs/zmq.yaml
  benchmark: configs/benchmark.yaml
  rknn: configs/rknn.yaml

# ============================================================================
# Data and Samples
# ============================================================================
data:
  root: data
  samples: samples/images
  calibration: samples/calibration
  cifar_cache: data/cifar10

# ============================================================================
# Model Artifacts
# ============================================================================
models:
  root: models
  registry: models/registry.json
  manifests: models/manifests

# ============================================================================
# Output Artifacts
# ============================================================================
artifacts:
  root: outputs
  baseline: outputs/baseline
  onnx: outputs/onnx
  quantized: outputs/quantized
  pruned: outputs/pruned
  rknn: outputs/rknn
  runtime: outputs/runtime
  reports: outputs/reports

# ============================================================================
# Source Code
# ============================================================================
src:
  root: src
  models: src/models
  export: src/export
  quantization: src/quantization
  compression: src/compression
  runtime: src/runtime
  server: src/server
  benchmark: src/benchmark
  report: src/report
  utils: src/utils

# ============================================================================
# Documentation
# ============================================================================
docs:
  root: docs
  references: docs/references.md
  path_configuration: docs/path_configuration.md
  deployment_report: docs/deployment_report.md

# ============================================================================
# External / Third-party
# ============================================================================
external:
  references: references
  rknn_toolkit2: references/rknn-toolkit2

# ============================================================================
# Cache
# ============================================================================
cache:
  root: .cache
  model_cache: models/.cache
