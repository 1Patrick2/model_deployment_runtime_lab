# TensorRT default precision benchmark config
# "default" precision avoids --fp16 flag, which is not available in TensorRT 11.1 trtexec.

model_id: mobilenetv3_small
onnx_model: outputs/onnx/mobilenetv3_small_imagenet_fp32.onnx
engine_output: outputs/tensorrt/mobilenetv3_small_default.engine

precision: default
input_name: input
input_shape: [1, 3, 224, 224]

trtexec:
  warmup: 200
  iterations: 1000
  workspace_mb: 2048

report_json: outputs/reports/tensorrt_mobilenetv3_small_default.json
report_md: outputs/reports/tensorrt_mobilenetv3_small_default.md
