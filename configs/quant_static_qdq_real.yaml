# Static QDQ quantization with real image calibration
# Requires representative images in calibration_real/ directory.

model:
  input_onnx: outputs/onnx/mobilenetv3_small_imagenet_fp32.onnx
  output_onnx: outputs/onnx/mobilenetv3_small_imagenet_int8_qdq_real.onnx
  input_name: input
  input_shape: [1, 3, 224, 224]

calibration:
  image_dir: samples/images/calibration_real
  max_samples: 50
  preprocessing: imagenet_v1
  resize_shorter: 256
  center_crop: [224, 224]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

quantization:
  format: qdq
  activation_type: int8
  weight_type: int8
